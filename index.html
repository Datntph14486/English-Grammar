<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ngữ Pháp Tiếng Anh — Tổng Hợp Toàn Diện</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8f7f4;--card:#fff;--text:#1a1a2e;--muted:#64648c;
  --accent:#4361ee;--accent2:#7209b7;--accent3:#f72585;
  --green:#06d6a0;--orange:#fb8500;--yellow:#ffd60a;
  --border:#e8e8ef;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.06);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;-webkit-font-smoothing:antialiased}

/* HERO */
.hero{background:linear-gradient(135deg,#4361ee 0%,#7209b7 50%,#f72585 100%);color:#fff;padding:36px 24px 28px;text-align:center}
.hero h1{font-size:clamp(1.3rem,4vw,1.9rem);font-weight:800;margin-bottom:6px;letter-spacing:-.5px}
.hero p{font-size:.9rem;opacity:.88;max-width:640px;margin:0 auto}

/* MAIN NAV */
.main-nav{display:flex;gap:0;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;overflow-x:auto;-webkit-overflow-scrolling:touch}
.main-nav button{flex:1;min-width:100px;padding:13px 12px;border:none;background:none;font-family:inherit;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.main-nav button.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(67,97,238,.04)}
.main-nav button:hover{color:var(--text)}
.badge{display:inline-block;font-size:.6rem;padding:1px 6px;border-radius:8px;margin-left:3px;font-weight:700;vertical-align:middle}
.b1{background:#e8f0fe;color:#4361ee}.b2{background:#f3e8fe;color:#7209b7}.b3{background:#fee8f0;color:#f72585}

/* CONTENT */
.content{max-width:920px;margin:0 auto;padding:20px 16px 60px}
.tab-panel{display:none}.tab-panel.active{display:block}

/* SUB NAV */
.sub-nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;padding:4px;background:#f0f0f5;border-radius:10px}
.sub-nav button{padding:7px 14px;border:none;background:none;border-radius:8px;font-family:inherit;font-size:.76rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
.sub-nav button.active{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);padding:22px;margin-bottom:14px;border:1px solid var(--border);box-shadow:var(--shadow)}
.card h2{font-size:1.1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card h3{font-size:.92rem;font-weight:700;margin:16px 0 8px;color:var(--accent2)}
.card p,.card li{font-size:.88rem}

/* TAG */
.tag{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.4px}
.tag-blue{background:#e8f0fe;color:#4361ee}.tag-green{background:#e8fef0;color:#06a06a}
.tag-red{background:#fee8e8;color:#e63946}.tag-orange{background:#fef3e8;color:#fb8500}
.tag-purple{background:#f3e8fe;color:#7209b7}.tag-gray{background:#eef;color:#555}
.tag-pink{background:#fce7f3;color:#be185d}

/* FORMULA */
.formula{background:linear-gradient(135deg,#f0f4ff,#f8f0ff);border:2px solid #d4d8f0;border-radius:10px;padding:14px 16px;margin:10px 0;font-family:'JetBrains Mono',monospace;font-size:.82rem;line-height:1.8}
.formula strong,.formula em{color:var(--accent);font-style:normal;font-weight:600}

/* EXAMPLE */
.ex{background:#fafbfc;border-left:3px solid var(--green);padding:10px 14px;margin:8px 0;border-radius:0 8px 8px 0;font-size:.86rem;line-height:1.7}
.ex b{color:var(--text);font-weight:600}
.ex-warn{border-left-color:var(--accent3)}

/* TABLE */
.tbl{overflow-x:auto;margin:10px 0}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:#f0f0f8;font-weight:600;text-align:left;padding:9px 12px;border-bottom:2px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}
tr:hover td{background:#fafaff}

/* NOTE/WARN */
.note{background:#fff8e1;border-radius:8px;padding:10px 14px;margin:10px 0;font-size:.84rem;border:1px solid #ffe082}
.note::before{content:'💡 '}
.warn{background:#fce4ec;border-radius:8px;padding:10px 14px;margin:10px 0;font-size:.84rem;border:1px solid #f48fb1}
.warn::before{content:'⚠️ '}

/* ACCORDION */
.acc{border:1px solid var(--border);border-radius:10px;margin:8px 0;overflow:hidden}
.acc summary{padding:10px 14px;cursor:pointer;font-weight:600;font-size:.86rem;background:#fafbfc;list-style:none;display:flex;align-items:center;gap:6px}
.acc summary::before{content:'▸';transition:transform .2s;font-size:.78rem;color:var(--muted)}
.acc[open] summary::before{transform:rotate(90deg)}
.acc-body{padding:12px 14px;font-size:.86rem}

/* IPA */
.ipa{font-family:'JetBrains Mono',monospace;color:var(--accent2);font-weight:500}

/* TENSE CARD special */
.tense-row{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.tense-head{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#f5f5fa;border-bottom:1px solid var(--border);flex-wrap:wrap}
.tense-head .tn{font-size:.9rem;font-weight:700}.tense-head .te{font-size:.78rem;color:var(--muted);font-style:italic}
.tense-grid{display:grid;grid-template-columns:1fr 1fr}
.tense-grid.single{grid-template-columns:1fr}
.voice-col{padding:12px 16px}
.voice-col+.voice-col{border-left:1px solid var(--border)}
.vlabel{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 10px;border-radius:20px;margin-bottom:8px}
.vlabel.va{background:#e8fef0;color:#06a06a}.vlabel.vp{background:#fef3e8;color:#fb8500}
.frow{display:flex;gap:6px;margin-bottom:4px;align-items:flex-start}
.frow .ft{font-size:.72rem;font-weight:700;color:var(--muted);min-width:22px;padding-top:4px}
.frow .fc{background:var(--bg);border-radius:6px;padding:5px 10px;flex:1;font-family:'JetBrains Mono',monospace;font-size:.78rem;line-height:1.5}
.frow .fc em{font-style:normal;color:var(--accent);font-weight:500}
.frow .fc .exx{font-family:'Inter',sans-serif;font-size:.76rem;color:var(--muted);margin-top:2px;font-style:italic}
.rare-note{font-size:.78rem;color:var(--muted);font-style:italic;padding:6px 0}

/* VERB CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
.chip{font-family:'JetBrains Mono',monospace;font-size:.75rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 8px}

/* IRR TABLE */
.irr-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--card)}
.irr-wrap table{width:100%}
.irr-wrap thead th{background:#f5f5fa;font-size:.72rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:9px 12px}
.irr-wrap tbody td{padding:7px 12px;font-size:.84rem}
.v1{font-family:'JetBrains Mono',monospace;font-weight:500;color:var(--accent);font-size:.82rem}
.v2{font-family:'JetBrains Mono',monospace;font-size:.82rem;color:#065f46}
.v3{font-family:'JetBrains Mono',monospace;font-size:.82rem;color:#7c2d12}

/* SEARCH */
.search-box{position:relative;max-width:340px}
.search-box input{width:100%;padding:8px 12px 8px 34px;font-family:inherit;font-size:.86rem;border:1px solid var(--border);border-radius:8px;background:var(--card);outline:none}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,97,238,.1)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;opacity:.4}
.alpha-row{display:flex;flex-wrap:wrap;gap:3px;margin:8px 0}
.alpha-row button{font-family:'JetBrains Mono',monospace;font-size:.72rem;padding:3px 7px;border-radius:4px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer}
.alpha-row button.on{background:#f3e8fe;color:#7209b7;border-color:#c4b5fd}
.no-res{text-align:center;padding:40px;color:var(--muted);font-size:.9rem}
.counter{font-size:.75rem;color:var(--muted)}

/* GROUP LABEL */
.glabel{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:24px 0 10px;padding-left:2px}
.glabel:first-child{margin-top:0}

/* SCROLL TOP */
.scroll-top{position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 12px rgba(67,97,238,.3);display:none;z-index:200;align-items:center;justify-content:center}
.scroll-top.show{display:flex}

.hidden{display:none}
@media(max-width:640px){
  .card{padding:16px}
  .main-nav button{padding:11px 8px;font-size:.72rem;min-width:70px}
  .tense-grid{grid-template-columns:1fr}
  .voice-col+.voice-col{border-left:none;border-top:1px solid var(--border)}
}
</style>
</head>
<body>

<div class="hero">
  <h1>📘 Ngữ Pháp Tiếng Anh — Tổng Hợp Toàn Diện</h1>
  <p>Từ loại · 24 thì · Mệnh đề · Cấu trúc câu · Mẫu động từ · Phát âm · Bất quy tắc</p>
</div>

<nav class="main-nav" id="mainNav">
  <button class="active" onclick="showTab(0)">📦 Từ Loại <span class="badge b1">Nền</span></button>
  <button onclick="showTab(1)">⏱ 24 Thì <span class="badge b1">Nền</span></button>
  <button onclick="showTab(2)">🔗 Mệnh Đề <span class="badge b2">Nâng cao</span></button>
  <button onclick="showTab(3)">📐 Cấu Trúc <span class="badge b2">Nâng cao</span></button>
  <button onclick="showTab(4)">🔧 Mẫu V <span class="badge b2">Nâng cao</span></button>
  <button onclick="showTab(5)">🔊 Phát Âm <span class="badge b3">GT</span></button>
  <button onclick="showTab(6)">📋 BQT</button>
</nav>

<div class="content">
<!-- TAB PANELS -->
<div class="tab-panel active" id="p0"><div class="sub-nav" id="sn0"></div><div id="wt-out"></div></div>
<div class="tab-panel" id="p1"><div class="sub-nav" id="sn1"></div><div id="tense-out"></div></div>
<div class="tab-panel" id="p2"><div class="sub-nav" id="sn2"></div><div id="cl-out"></div></div>
<div class="tab-panel" id="p3"><div class="sub-nav" id="sn3"></div><div id="st-out"></div></div>
<div class="tab-panel" id="p4"><div class="sub-nav" id="sn4"></div><div id="vp-out"></div></div>
<div class="tab-panel" id="p5"><div class="sub-nav" id="sn5"></div><div id="ph-out"></div></div>
<div class="tab-panel" id="p6">
  <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px">
    <div class="search-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg><input id="irrQ" placeholder="Tìm V1, nghĩa..." oninput="renderIrr()"></div>
    <div class="alpha-row" id="alphaRow"></div>
    <span class="counter" id="irrCnt"></span>
  </div>
  <div class="irr-wrap"><table><thead><tr><th>#</th><th>V1</th><th>V2</th><th>V3</th><th>Nghĩa</th></tr></thead><tbody id="irrBody"></tbody></table><div class="no-res" id="noRes" style="display:none">Không tìm thấy.</div></div>
</div>
</div>

<button class="scroll-top" id="scrollBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
/* ── TAB / SUB SWITCHING ── */
function showTab(i){
  document.querySelectorAll('.tab-panel').forEach((p,j)=>p.classList.toggle('active',j===i));
  document.querySelectorAll('#mainNav button').forEach((b,j)=>b.classList.toggle('active',j===i));
  window.scrollTo({top:0,behavior:'smooth'});
}
function buildSub(id,labels,cb){
  const nav=document.getElementById(id);nav.innerHTML='';
  labels.forEach((l,i)=>{const b=document.createElement('button');b.textContent=l;if(i===0)b.classList.add('active');b.onclick=()=>{nav.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');cb(i)};nav.appendChild(b)})
}

/* ── GENERIC CARD BUILDER ── */
function H(s){return s||''}
function buildCard(item){
  let html='<div class="card"><h2>';
  if(item.tag)html+=`<span class="tag ${item.tag}">${item.tagText}</span> `;
  html+=`${item.name}</h2>`;
  item.sections.forEach(s=>{
    if(s.label){
      const isW=s.label.includes('⚠️'),isT=s.label.includes('💡')||s.label.includes('📝');
      if(isW)html+=`<div class="warn">`;
      else if(isT)html+=`<div class="note">`;
      else html+=`<h3>${s.label}</h3>`;
      if(isW||isT)html+=`<b>${s.label.replace(/^[⚠️💡📝]\s*/,'')}</b><br>`;
    }
    if(s.formula)html+=`<div class="formula">${s.formula}</div>`;
    if(s.desc)html+=`<div class="ex">${s.desc}</div>`;
    if(s.example)html+=`<div class="ex">${s.example}</div>`;
    if(s.note)html+=`<div style="font-size:.82rem;color:var(--muted);margin:4px 0 6px;padding-left:10px;border-left:2px solid var(--border)">${s.note}</div>`;
    if(s.table)html+=`<div class="tbl">${s.table}</div>`;
    if(s.verbs)html+=`<div class="chips">${s.verbs.map(v=>`<span class="chip">${v}</span>`).join('')}</div>`;
    if(s.label&&(s.label.includes('⚠️')||s.label.includes('💡')||s.label.includes('📝')))html+=`</div>`;
  });
  return html+'</div>';
}
function renderGroup(data,outId,catKey,catLabels,catOrder){
  const out=document.getElementById(outId);out.innerHTML='';
  catOrder.forEach(cat=>{
    if(catKey!=='all'&&catKey!==cat)return;
    const items=data.filter(d=>d.cat===cat);if(!items.length)return;
    out.innerHTML+=`<div class="glabel">${catLabels[cat]}</div>`;
    items.forEach(item=>out.innerHTML+=buildCard(item));
  });
}

const TG=[{k:'present',l:'Hiện tại'},{k:'past',l:'Quá khứ'},{k:'future',l:'Tương lai'}];
let curTT='all',showA=true,showP=true;
function mkV(d,type){
  const isA=type==='a',lbl=isA?'Chủ động':'Bị động',cls=isA?'va':'vp';
  if(d.r)return `<div class="voice-col"><span class="vlabel ${cls}">${lbl}</span><div class="rare-note">${d.p[0]}${d.p[1]?' — '+d.p[1]:''}</div></div>`;
  const rows=[{s:'(+)',d:d.p},{s:'(−)',d:d.m},{s:'(?)',d:d.q}];
  return `<div class="voice-col"><span class="vlabel ${cls}">${lbl}</span>${rows.map(r=>`<div class="frow"><span class="ft">${r.s}</span><div class="fc">${r.d[0]}${r.d[1]?`<div class="exx">${r.d[1]}</div>`:''}</div></div>`).join('')}</div>`;
}
function renderT(){
  const out=document.getElementById('tense-out');out.innerHTML='';let cnt=0;
  TG.forEach(g=>{if(curTT!=='all'&&curTT!==g.k)return;out.innerHTML+=`<div class="glabel">${g.l}</div>`;
    TD.filter(d=>d.t===g.k).forEach(t=>{cnt++;
      let v='';if(showA)v+=mkV(t.a,'a');if(showP)v+=mkV(t.b,'b');
      /* USAGE DETAIL */
      let detail='<div style="padding:14px 18px;border-top:1px solid var(--border)">';
      detail+=`<h3 style="margin-top:0">📖 Cách dùng</h3><div class="ex">${t.usage.map(u=>'• '+u).join('<br>')}</div>`;
      detail+=`<h3>🔑 Dấu hiệu nhận biết</h3><div class="formula">${t.signals}</div>`;
      if(t.exMore){detail+=`<h3>📝 Ví dụ chi tiết</h3><div class="ex">${t.exMore.join('<br>')}</div>`;}
      if(t.notes){detail+=`<div class="note" style="margin-top:10px">${t.notes}</div>`;}
      detail+='</div>';
      out.innerHTML+=`<div class="tense-row"><div class="tense-head"><span class="tn">${t.n}</span><span class="te">${t.e}</span></div><div class="tense-grid${(showA&&showP)?'':' single'}">${v}</div>${detail}</div>`;
    });
  });
  out.innerHTML+=`<div class="card" style="margin-top:16px"><h2>🔄 Tương lai gần</h2><div class="formula"><em>Be going to</em> + V(bare): dự định có sẵn, bằng chứng hiện tại.<br><em>Be about to</em> + V(bare): sắp xảy ra ngay lập tức.</div><div class="ex">I <b>am going to</b> study abroad next year. (đã quyết định)<br>Look at those clouds — it <b>is going to</b> rain. (bằng chứng)<br>The movie <b>is about to</b> start. Hurry up!</div><div class="note"><b>will</b> = quyết định tức thì, dự đoán chung. <b>be going to</b> = dự định có sẵn, bằng chứng cụ thể.</div></div>`;
  out.innerHTML+=`<div class="note" style="margin-top:10px"><b>Bị động</b> của các thì hoàn thành tiếp diễn và tương lai tiếp diễn <b>cực kỳ hiếm</b>. CT tổng quát: tìm trợ V chính, thêm <b>been + V3</b>.</div>`;
}
function initT(){
  buildSub('sn1',['Tất cả','Hiện tại','Quá khứ','Tương lai','· Chủ động','· Bị động'],i=>{
    if(i<4){curTT=['all','present','past','future'][i]}
    else if(i===4){showA=!showA;if(!showA&&!showP)showA=true}
    else{showP=!showP;if(!showA&&!showP)showP=true}
    const sn=document.getElementById('sn1');
    sn.children[0].classList.toggle('active',curTT==='all');
    sn.children[1].classList.toggle('active',curTT==='present');
    sn.children[2].classList.toggle('active',curTT==='past');
    sn.children[3].classList.toggle('active',curTT==='future');
    sn.children[4].classList.toggle('active',showA);sn.children[4].style.opacity=showA?1:.5;
    sn.children[5].classList.toggle('active',showP);sn.children[5].style.opacity=showP?1:.5;
    renderT();
  });
  document.getElementById('sn1').children[4].classList.add('active');
  document.getElementById('sn1').children[5].classList.add('active');
  renderT();
}

let alphaF='';
function initIrr(){
  const letters=[...new Set(IV.map(v=>v[0][0].toUpperCase()))].sort();
  const row=document.getElementById('alphaRow');
  letters.forEach(l=>{const b=document.createElement('button');b.textContent=l;b.onclick=()=>{if(alphaF===l){alphaF='';b.classList.remove('on')}else{row.querySelectorAll('button').forEach(x=>x.classList.remove('on'));alphaF=l;b.classList.add('on')}renderIrr()};row.appendChild(b)});
  renderIrr();
}
function renderIrr(){
  const q=(document.getElementById('irrQ')?.value||'').trim().toLowerCase();
  let list=IV;
  if(alphaF)list=list.filter(v=>v[0][0].toUpperCase()===alphaF);
  if(q)list=list.filter(v=>v.some(x=>x.toLowerCase().includes(q)));
  const tb=document.getElementById('irrBody');tb.innerHTML='';
  document.getElementById('noRes').style.display=list.length?'none':'block';
  document.getElementById('irrCnt').textContent=list.length+' động từ';
  list.forEach((v,i)=>{const tr=document.createElement('tr');
    const hl=(s)=>q?s.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark style="background:#fef08a;border-radius:2px">$1</mark>'):s;
    tr.innerHTML=`<td style="color:var(--muted);font-size:.75rem;text-align:right;padding-right:6px">${i+1}</td><td class="v1">${hl(v[0])}</td><td class="v2">${hl(v[1])}</td><td class="v3">${hl(v[2])}</td><td style="font-size:.82rem;color:var(--muted)">${hl(v[3])}</td>`;
    tb.appendChild(tr)});
}
